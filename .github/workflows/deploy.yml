name: Deploy to CloudBase

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./backend

      - name: TypeScript check
        run: pnpm typecheck
        working-directory: ./backend

      - name: Build
        run: pnpm build
        working-directory: ./backend

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli

      - name: Login to CloudBase
        run: |
          tcb login --apiKeyId ${{ secrets.TCB_SECRET_ID }} \
                    --apiKey ${{ secrets.TCB_SECRET_KEY }}

      - name: Deploy backend to CloudBase Cloud Run
        run: |
          tcb cloudrun deploy \
            -e ${{ secrets.TCB_ENV_ID }} \
            -s aixuan-backend \
            --port 3000 \
            --source ./backend \
            --force

      - name: Deploy frontend to CloudBase Hosting
        if: false  # 前端待实现后启用
        run: |
          tcb hosting deploy ./frontend/dist \
            -e ${{ secrets.TCB_ENV_ID }} \
            --force
