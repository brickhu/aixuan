name: Deploy to Alibaba Cloud

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./backend

      - name: TypeScript check
        run: pnpm typecheck
        working-directory: ./backend

      - name: Build
        run: pnpm build
        working-directory: ./backend

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            echo "=== 1. 确保项目目录存在 ==="
            mkdir -p /opt/aixuan

            echo "=== 2. 配置 Docker 镜像加速（国内访问 Docker Hub） ==="
            mkdir -p /etc/docker
            if [ ! -f /etc/docker/daemon.json ] || ! grep -q "registry-mirrors" /etc/docker/daemon.json 2>/dev/null; then
              cat > /etc/docker/daemon.json << 'EOF'
            {
              "registry-mirrors": [
                "https://docker.m.daocloud.io",
                "https://registry.cn-hangzhou.aliyuncs.com"
              ]
            }
            EOF
              systemctl daemon-reload
              systemctl restart docker
            fi

            echo "=== 3. 配置 SSH 并信任 GitHub 主机密钥 ==="
            mkdir -p ~/.ssh
            chmod 700 ~/.ssh
            # 配置 GitHub 使用 deploy-key
            cat > ~/.ssh/config << 'SSHEOF'
            Host github.com
              HostName github.com
              User git
              IdentityFile ~/.ssh/deploy-key
              StrictHostKeyChecking no
            SSHEOF
            # 添加 known_hosts
            grep -q "github.com" ~/.ssh/known_hosts 2>/dev/null || \
              ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null

            echo "=== 3. 克隆或拉取代码 ==="
            if [ ! -d /opt/aixuan/.git ]; then
              echo "首次部署，克隆仓库..."
              cd /opt
              rm -rf aixuan
              git clone git@github.com:${{ github.repository }}.git aixuan
              cd /opt/aixuan
            else
              cd /opt/aixuan
              git pull origin main
            fi

            echo "=== 4. 创建 .env ==="
            cat > /opt/aixuan/.env << 'ENVEOF'
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
            DEEPSEEK_BASE_URL=${{ secrets.DEEPSEEK_BASE_URL }}
            DEEPSEEK_MODEL=${{ secrets.DEEPSEEK_MODEL }}
            CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
            ENVEOF

            echo "=== 4. 构建并重启服务 ==="
            cd /opt/aixuan
            docker compose up -d --build

            echo "=== 5. 清理旧镜像 ==="
            docker image prune -f

            echo "=== ✅ 部署完成 ==="